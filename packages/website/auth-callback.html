<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>autopilot — signed in</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .callback-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        text-align: center;
      }
      .callback-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(34, 197, 94, 0.1);
        border-radius: 50%;
        margin-bottom: 20px;
      }
      .callback-icon svg {
        color: #22c55e;
      }
      .callback-title {
        font-size: 18px;
        font-weight: 600;
        color: #fafafa;
        margin-bottom: 8px;
      }
      .callback-sub {
        font-size: 13px;
        color: #52525b;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <nav>
        <a href="./" class="nav-logo">autopilot</a>
      </nav>

      <div class="callback-page">
        <div class="callback-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <p class="callback-title">Signed in</p>
        <p class="callback-sub">You can close this tab and return to the extension.</p>
      </div>

      <footer>
        <span class="footer-logo">autopilot</span>
      </footer>
    </div>
  </body>
</html>

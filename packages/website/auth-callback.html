<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>autopilot — signed in</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .callback-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        text-align: center;
      }
      .callback-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(34, 197, 94, 0.1);
        border-radius: 50%;
        margin-bottom: 20px;
      }
      .callback-icon svg {
        color: #22c55e;
      }
      .callback-icon--error {
        background: rgba(239, 68, 68, 0.1);
      }
      .callback-icon--error svg {
        color: #ef4444;
      }
      .callback-title {
        font-size: 18px;
        font-weight: 600;
        color: #fafafa;
        margin-bottom: 8px;
      }
      .callback-sub {
        font-size: 13px;
        color: #52525b;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <nav>
        <a href="./" class="nav-logo">autopilot</a>
      </nav>

      <div class="callback-page">
        <div class="callback-icon" id="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <p class="callback-title" id="title">Signing in...</p>
        <p class="callback-sub" id="sub">Connecting to autopilot extension.</p>
      </div>

      <footer>
        <span class="footer-logo">autopilot</span>
      </footer>
    </div>

    <script>
      const EXTENSION_ID = "cojhoeoiabkniahpnhobifbgpicfabpg";

      const hash = window.location.hash.slice(1);
      const params = new URLSearchParams(hash);
      const idToken = params.get("id_token");

      if (!idToken) {
        document.getElementById("icon").classList.add("callback-icon--error");
        document.getElementById("title").textContent = "Sign-in cancelled";
        document.getElementById("sub").textContent = "No sign-in token received. Please try again from the extension.";
      } else if (chrome.runtime && chrome.runtime.sendMessage) {
        chrome.runtime.sendMessage(
          EXTENSION_ID,
          { type: "oauth_callback", idToken: idToken },
          function(response) {
            if (response && response.success) {
              document.getElementById("title").textContent = "Signed in";
              document.getElementById("sub").textContent = "You can close this tab and reopen the extension.";
            } else {
              document.getElementById("icon").classList.add("callback-icon--error");
              document.getElementById("title").textContent = "Something went wrong";
              document.getElementById("sub").textContent = response?.error || "Could not connect to the extension. Is autopilot installed?";
            }
          }
        );
      } else {
        document.getElementById("icon").classList.add("callback-icon--error");
        document.getElementById("title").textContent = "Extension not found";
        document.getElementById("sub").textContent = "Make sure autopilot is installed and try again.";
      }
    </script>
  </body>
</html>

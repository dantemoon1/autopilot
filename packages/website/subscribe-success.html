<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>autopilot — subscribed</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .callback-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        text-align: center;
      }
      .callback-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(34, 197, 94, 0.1);
        border-radius: 50%;
        margin-bottom: 20px;
      }
      .callback-icon svg {
        color: #22c55e;
      }
      .callback-title {
        font-size: 18px;
        font-weight: 600;
        color: #fafafa;
        margin-bottom: 8px;
      }
      .callback-sub {
        font-size: 13px;
        color: #52525b;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <nav>
        <a href="./" class="nav-logo">autopilot</a>
      </nav>

      <div class="callback-page">
        <div class="callback-icon" id="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <p class="callback-title" id="title">You're subscribed!</p>
        <p class="callback-sub" id="sub">Connecting to autopilot...</p>
      </div>

      <footer>
        <span class="footer-logo">autopilot</span>
      </footer>
    </div>

    <script>
      var EXTENSION_ID = "cojhoeoiabkniahpnhobifbgpicfabpg";
      var attempts = 0;
      var maxAttempts = 30;

      function notifyExtension() {
        attempts++;
        if (chrome.runtime && chrome.runtime.sendMessage) {
          chrome.runtime.sendMessage(
            EXTENSION_ID,
            { type: "subscription_complete" },
            function(response) {
              if (chrome.runtime.lastError || !response) {
                if (attempts < maxAttempts) {
                  setTimeout(notifyExtension, 2000);
                } else {
                  document.getElementById("sub").textContent = "You can close this tab and reopen the extension.";
                }
                return;
              }
              if (response.active) {
                document.getElementById("sub").textContent = "You're all set! You can close this tab and open the extension.";
              } else if (attempts < maxAttempts) {
                setTimeout(notifyExtension, 2000);
              } else {
                document.getElementById("sub").textContent = "You can close this tab and reopen the extension.";
              }
            }
          );
        } else {
          document.getElementById("sub").textContent = "You can close this tab and reopen the extension.";
        }
      }

      setTimeout(notifyExtension, 1500);
    </script>
  </body>
</html>
